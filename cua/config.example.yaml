# CUA Configuration
# Copy this file to config.yaml and fill in your values.
# config.yaml is gitignored — never commit your API key.

# Kimi API
moonshot_api_key: ""          # Your Kimi API key (or set MOONSHOT_API_KEY env var)
model: "kimi-k2.6"            # LLM model (kimi-k2.6, kimi-k2.7-code, etc.)
base_url: "https://api.moonshot.cn/v1"
max_tokens: 32768             # Max tokens per API call

# Agent loop
max_iterations: 50            # Max tool-calling iterations per task

# Screenshot
jpeg_quality: 85              # JPEG compression quality (1-100)

# Overlay style
overlay:
  circle_radius: 15           # Inner red circle radius (px)
  outer_radius: 18            # White outer ring radius (px)
  line_width: 2               # Crosshair line width (px)
  outer_width: 4              # White ring line width (px)
  inner_width: 3              # Red circle line width (px)
  color: "#e74c3c"            # Red crosshair/circle color
  white: "#ffffff"            # White ring color

# Learning system
learning:
  autoskill_enabled: true     # Auto-generate skills from successful tasks
  autoskill_min_steps: 3      # Min tool calls before extracting a skill
  autoskill_max_skills: 0     # Max stored skills (0=unlimited)
  reflection_enabled: true    # Analyze failures and inject into prompt
  reflection_max_prompt: 5    # Past reflections to include in system prompt
  learnings_max_prompt: 10    # Past learnings to include in system prompt
  pending_enabled: true       # Save interrupted tasks for later settlement
  pending_max_retries: 3      # Max LLM settlement attempts per task
  cleanup_days: 0             # Auto-delete old learnings (0=never, days if >0)
